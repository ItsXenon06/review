<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông Báo - Quản Lý Thuê Xe Tự Lái</title>
  <th:block th:replace="~{fragments/shared-styles :: styles}"></th:block>
  <style>
    /* Dashboard-specific overrides */
    .collapsible-btn { width:100%; border:1px solid var(--border); background:#fff; padding:15px;
                       border-radius:12px; text-align:left; display:flex; align-items:center;
                       cursor:pointer; transition:.15s; }
    .collapsible-btn:hover { background:var(--primary-light); }
    .btn-content { display:flex; align-items:center; gap:12px; width:100%; }
    .customer-details-block { max-height:0; overflow:hidden; transition:max-height .3s ease; }
    .details-inner { background:#f8fafc; border:1px solid var(--border); border-top:none;
                     border-radius:0 0 12px 12px; padding:20px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px; margin-top:12px; }
    .reminder-item { display:flex; align-items:center; justify-content:space-between;
                     padding:12px 0; border-bottom:1px solid #f0f0f0; }
    .reminder-item:last-child { border-bottom:none; }
    .reminder-name { font-weight:600; font-size:13px; margin:0; }
    .reminder-desc { font-size:12px; color:var(--text-muted); margin:2px 0 0; }
    .time-stamp { font-size:12px; color:var(--text-muted); white-space:nowrap; margin-left:auto; }
    .icon-circle { font-size:24px; flex-shrink:0; }
    .text-info-block strong { font-size:13px; display:block; }
    .text-info-block p { font-size:12px; color:var(--text-muted); margin:2px 0 0; }
    .action-btn { font-size:12px; padding:5px 10px; border-radius:6px; cursor:pointer; border:none; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
                     z-index:9999; align-items:center; justify-content:center; }
    .modal-box { background:#fff; border-radius:14px; padding:30px; max-width:400px; text-align:center; }
  </style>
</head>
<body>
<div class="layout">
  <th:block th:replace="~{fragments/sidebar :: sidebar('notifications')}"></th:block>
  <div class="main-wrap">
    <th:block th:replace="~{fragments/topbar :: topbar('Thông báo & Nhắc nhở')}"></th:block>
    <main class="page-content">
      <div class="mb-4">
        <h1 class="page-title">Thông báo, nhắc nhở</h1>
        <p class="page-subtitle">Cập nhật các thông báo hệ thống và nhắc nhở quan trọng.</p>
      </div>
      <!-- Replace the <div class="row g-4"> section with: -->
<div class="row g-4">
  <!-- LEFT: Expiring Contracts -->
  <div class="col-lg-8">
    <div class="data-card">
      <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
        <h6 class="fw-700 mb-0"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Hợp đồng sắp hết hạn</h6>
        <a href="/contracts" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
      </div>
      <table class="data-table">
        <thead>
          <tr><th>#</th><th>Khách hàng</th><th>Ngày kết thúc</th><th>Trạng thái</th><th>Thao tác</th></tr>
        </thead>
        <tbody>
          <tr th:each="c : ${expiringContracts}" th:if="${c != null and c.contractID != null}">
            <td th:text="'#00' + ${c.contractID}"></td>
            <td th:text="${c.customer != null ? c.customer.firstName + ' ' + c.customer.lastName : 'N/A'}"></td>
            <td th:text="${c.endDate != null ? #temporals.format(c.endDate, 'dd/MM/yyyy HH:mm') : '--'}"></td>
            <td>
              <span th:class="${c.expired ? 'status-badge status-cancelled' : 'status-badge status-pending'}"
                    th:text="${c.daysRemainingStatus}"></span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-primary"
                      th:attr="data-contract-id=${c.contractID}, data-end-date=${c.endDate}"
                      onclick="submitReminder(this)">Nhắc nhở</button>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(expiringContracts)}">
            <td colspan="5" class="text-center text-muted py-3">Không có hợp đồng sắp hết hạn</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: Upcoming Maintenance -->
  <div class="col-lg-4">
    <div class="data-card">
      <div class="p-3 border-bottom">
        <h6 class="fw-700 mb-0"><i class="bi bi-tools me-2 text-warning"></i>Bảo dưỡng sắp tới</h6>
      </div>
      <div id="maintenance-container" class="p-3">
        <div th:each="m : ${maintenanceList}" class="reminder-item">
          <div>
            <p class="reminder-name" th:text="${m.make + ' - ' + m.licensePlate}"></p>
            <p class="reminder-desc" th:text="${m.description}"></p>
          </div>
          <div class="time-stamp" th:text="${m.nextServiceDate}"></div>
        </div>
        <p th:if="${#lists.isEmpty(maintenanceList)}" class="text-muted text-center py-3">Không có lịch bảo dưỡng</p>
      </div>
    </div>
  </div>
</div>
      </div>
    </main>
  </div>
</div>
<script>
    // 1. Hàm đóng/mở khối danh sách hợp đồng (Gom nhóm)
    function toggleGroup(btn) {
        var content = document.getElementById('all-contracts-group');
        if (!content) return;
        if (content.style.display === "none" || content.style.display === "") {
            content.style.display = "block";
        } else {
            content.style.display = "none";
        }
    }

    // 2. Hàm đóng/mở chi tiết từng mục
    function toggleDetails(buttonElement) {
        var detailsBlock = buttonElement.nextElementSibling;
        if (!detailsBlock) return;

        if (detailsBlock.style.maxHeight && detailsBlock.style.maxHeight !== "0px") {
            detailsBlock.style.maxHeight = "0px";
            buttonElement.style.borderRadius = "14px";
        } else {
            detailsBlock.style.maxHeight = "none";
            var targetHeight = detailsBlock.scrollHeight;
            detailsBlock.style.maxHeight = "0px";
            setTimeout(function() {
                detailsBlock.style.maxHeight = targetHeight + "px";
            }, 10);
            buttonElement.style.borderRadius = "14px 14px 0 0";
        }
    }

    // 3. Hàm xử lý logic Gửi thông báo (Đã gộp kiểm tra hạn + Gọi API)
    function submitReminder(button) {
        // Lấy dữ liệu
        const contractId = button.getAttribute('data-contract-id');
        const endDateStr = button.getAttribute('data-end-date');

        // Chuyển đổi ngày để so sánh
        const endDate = new Date(endDateStr.replace(' ', 'T'));
        const now = new Date();

        // Kiểm tra hạn
        if (now > endDate) {
            // HỢP ĐỒNG QUÁ HẠN -> Mới thực hiện gọi server
            fetch('/api/notifications/send/' + contractId, {
                method: 'POST'
            })
            .then(response => response.text().then(text => {
                if (response.ok) {
                    alert('Thành công: ' + text);
                    button.innerText = "Đã nhắc nhở";
                    button.style.backgroundColor = "#95a5a6";
                    button.disabled = true;
                } else {
                    alert('Lỗi từ server: ' + text);
                }
            }))
            .catch(error => {
                console.error('Lỗi kết nối:', error);
                alert('Không thể kết nối đến máy chủ!');
            });
        } else {
            // HỢP ĐỒNG CÒN HẠN -> Chặn lại
            alert("Hợp đồng 000" + contractId + " vẫn còn thời hạn thuê. Không thể gửi thông báo trả xe!");
        }
    }
</script>
<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Thông báo</h3>
        <p id="modalMessage"></p>
        <button onclick="closeModal()">Đóng</button>
    </div>
</div>
<script>
    // --- Các hàm hỗ trợ Modal ---
    function showModal(message) {
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    // --- Các hàm chức năng ---
    function toggleGroup(btn) {
        var content = document.getElementById('all-contracts-group');
        if (!content) return;
        content.style.display = (content.style.display === "none" || content.style.display === "") ? "block" : "none";
    }

    function toggleDetails(buttonElement) {
        var detailsBlock = buttonElement.nextElementSibling;
        if (!detailsBlock) return;
        if (detailsBlock.style.maxHeight && detailsBlock.style.maxHeight !== "0px") {
            detailsBlock.style.maxHeight = "0px";
            buttonElement.style.borderRadius = "14px";
        } else {
            detailsBlock.style.maxHeight = "none";
            var targetHeight = detailsBlock.scrollHeight;
            detailsBlock.style.maxHeight = "0px";
            setTimeout(function() { detailsBlock.style.maxHeight = targetHeight + "px"; }, 10);
            buttonElement.style.borderRadius = "14px 14px 0 0";
        }
    }

    function submitReminder(button) {
        const contractId = button.getAttribute('data-contract-id');
        const endDateStr = button.getAttribute('data-end-date');
        const endDate = new Date(endDateStr.replace(' ', 'T'));
        const now = new Date();

        if (now > endDate) {
            // Trường hợp quá hạn -> Gọi API
            fetch('/api/notifications/send/' + contractId, { method: 'POST' })
            .then(response => response.text().then(text => {
                if (response.ok) {
                    showModal('Thành công: ' + text);
                    button.innerText = "Đã nhắc nhở";
                    button.style.backgroundColor = "#95a5a6";
                    button.disabled = true;
                } else {
                    showModal('Lỗi từ server: ' + text);
                }
            }))
            .catch(error => {
                console.error('Lỗi:', error);
                showModal('Không thể kết nối đến máy chủ!');
            });
        } else {
            // Trường hợp còn hạn -> Dùng Modal thay cho alert
            showModal("Hợp đồng 000" + contractId + " vẫn còn thời hạn thuê. Không thể gửi thông báo trả xe!");
        }
    }
</script>
<script>
    // Hàm này sẽ tự động chạy khi trang web tải xong
    document.addEventListener("DOMContentLoaded", function() {
        fetch('/api/maintenance/list')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('maintenance-container');
                if (!container) return;

                // Xóa nội dung mặc định (ví dụ: "Không có dữ liệu")
                container.innerHTML = '';

                data.forEach(item => {
                    const html = `
                        <div class="reminder-item">
                            <div class="reminder-info">
                                <p class="reminder-name">${item.make} - ${item.licensePlate}</p>
                                <p class="reminder-desc">${item.description}</p>
                            </div>
                            <div class="reminder-time text-warning">
                                <small>${item.nextServiceDate}</small>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                console.error('Lỗi lấy dữ liệu:', err);
                document.getElementById('maintenance-container').innerHTML = '<p style="text-align:center;">Không thể tải dữ liệu bảo dưỡng.</p>';
            });
    });
</script>
</body>
</html>

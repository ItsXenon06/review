<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - Quản lý thuê xe tự lái</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body{background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .login-card{background:#fff;border-radius:16px;padding:40px 36px;width:400px;box-shadow:0 4px 24px rgba(0,0,0,.10);}
        .brand-icon{width:52px;height:52px;background:#1d6fe8;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;margin:0 auto 12px;}
        .brand-title{font-size:15px;font-weight:700;color:#1d6fe8;text-align:center;margin-bottom:4px;}
        .brand-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px;}
        .form-label{font-size:13px;font-weight:600;}
        .form-control{font-size:14px;border-radius:9px;padding:10px 14px;}
        .btn-login{background:#1d6fe8;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;width:100%;color:#fff;}
        .btn-login:hover{background:#1558c0;color:#fff;}
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
    <div class="brand-title">QUẢN LÝ THUÊ XE TỰ LÁI</div>
    <div class="brand-sub">Đăng nhập để tiếp tục</div>

    <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:13px">
        <i class="bi bi-exclamation-triangle me-1"></i> Email hoặc mật khẩu không đúng.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2" style="font-size:13px">
        <i class="bi bi-check-circle me-1"></i> Đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label" for="username">Email</label>
            <input id="username" name="username" type="email" class="form-control"
                   placeholder="admin@thuexe.vn" required autofocus/>
        </div>
        <div class="mb-4">
            <label class="form-label" for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" class="form-control"
                   placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
        </button>
    </form>
</div>
</body>
</html>

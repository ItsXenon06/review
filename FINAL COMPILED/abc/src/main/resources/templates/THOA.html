<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<!-- HEAD -->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Phân Quyền - Quản Lý Thuê Xe Tự Lái</title>

    <th:block th:replace="~{fragments/shared-styles :: styles}"></th:block>

    <style>
        /* Role/permission-specific styles only (NO sidebar/topbar/body layout here) */

        .pq-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;}

        /* keep ALL your existing role/permission/table/modal styles below unchanged */
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR (FRAGMENT) -->
    <th:block th:replace="~{fragments/sidebar :: sidebar('phan-quyen')}"></th:block>

    <div class="main-wrap">

        <!-- TOPBAR (FRAGMENT) -->
        <th:block th:replace="~{fragments/topbar :: topbar('Phân quyền')}"></th:block>

        <!-- CONTENT -->
        <div class="content">

            <div class="page-header">
                <div class="page-title">Phân quyền</div>
                <div class="page-sub">Quản lý vai trò và phân quyền cho người dùng trong hệ thống.</div>
            </div>

            <div class="tabs">
                <div class="tab-list">
                    <div class="tab active" onclick="switchTab('vai-tro', this)">
                        Vai trò
                    </div>
                    <div class="tab" onclick="switchTab('nguoi-dung', this)">
                        Người dùng
                    </div>
                </div>

                <button class="btn-primary" onclick="openModal('modal-tao-vai-tro')">
                    Thêm vai trò
                </button>
            </div>

            <!-- TAB VAI TRÒ -->
            <div id="tab-vai-tro" class="pq-layout">
                <!-- ROLE LIST -->
                <div class="role-panel">
                    ...
                </div>

                <!-- PERMISSION PANEL -->
                <div class="quyen-panel" id="quyen-panel">
                    ...
                </div>
            </div>

            <!-- TAB NGƯỜI DÙNG -->
            <div id="tab-nguoi-dung" style="display:none;">
                ...
            </div>

        </div>
    </div>
</div>

<!-- MODALS (UNCHANGED) -->
<div class="modal-overlay" id="modal-tao-vai-tro">...</div>
<div class="modal-overlay" id="modal-nhap-quyen">...</div>
<div class="modal-overlay" id="modal-sua-vai-tro">...</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SCRIPT (UNCHANGED) -->
<script>
    // your entire JS stays exactly the same
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:fragment="styles">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary:#1d6fe8; --primary-dark:#1558c0; --primary-light:#e8f0fd;
    --sidebar-bg:#0f172a; --sidebar-text:#94a3b8;
    --border:#e2e8f0; --bg:#f1f5f9; --card-bg:#fff;
    --text:#1e293b; --text-muted:#64748b;
    --success:#16a34a; --danger:#dc2626; --warning:#f59e0b;
    --topbar-h:60px; --sidebar-w:260px;
  }
  *, *::before, *::after { box-sizing:border-box; }
  body { font-family:'Be Vietnam Pro',sans-serif; background:var(--bg); color:var(--text); margin:0; }
  .fw-600 { font-weight:600!important; }
  .fw-700 { font-weight:700!important; }

  /* Layout */
  .layout { display:flex; min-height:100vh; }
  .main-wrap { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

  /* Sidebar */
  .sidebar { width:var(--sidebar-w); background:var(--sidebar-bg); color:var(--sidebar-text);
             display:flex; flex-direction:column; position:fixed; height:100vh; overflow-y:auto; z-index:100; }
  .sidebar-logo { display:flex; align-items:center; gap:10px; padding:20px;
                  border-bottom:1px solid rgba(255,255,255,.06); }
  .logo-icon { width:36px; height:36px; background:var(--primary); border-radius:10px;
               display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; }
  .logo-text { font-size:13px; font-weight:700; color:#fff; line-height:1.3; }
  .sidebar nav { flex:1; padding:12px; }
  .sidebar-link { display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px;
                  color:var(--sidebar-text); text-decoration:none; font-size:14px; font-weight:500;
                  transition:.15s; margin-bottom:2px; }
  .sidebar-link:hover { background:rgba(255,255,255,.06); color:#cbd5e1; }
  .sidebar-link.active { background:var(--primary); color:#fff; }
  .sidebar-link i { font-size:16px; width:20px; text-align:center; }
  .sidebar-support { margin:12px; padding:14px 16px; background:rgba(29,111,232,.18); border-radius:12px; }
  .sidebar-support p { font-size:12px; margin:0 0 2px; color:#94a3b8; }
  .sidebar-support .phone { font-size:15px; font-weight:700; color:#60a5fa; }

  /* Topbar */
  .topbar { height:var(--topbar-h); background:#fff; border-bottom:1px solid var(--border);
            display:flex; align-items:center; padding:0 24px; gap:12px;
            position:sticky; top:0; z-index:50; }
  .topbar-spacer { flex:1; }
  .notif-btn { width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:#fff;
               display:flex; align-items:center; justify-content:center; cursor:pointer;
               position:relative; color:var(--text); font-size:17px; }
  .notif-badge { position:absolute; top:3px; right:3px; width:16px; height:16px; background:var(--danger);
                 color:#fff; border-radius:50%; font-size:9px; display:flex; align-items:center; justify-content:center; }
  .user-pill { display:flex; align-items:center; gap:8px; padding:5px 10px;
               border:1px solid var(--border); border-radius:40px; cursor:pointer; font-size:13px; }
  .user-avatar { width:30px; height:30px; background:var(--primary); border-radius:50%;
                 display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }

  /* Page */
  .page-content { padding:28px; flex:1; }
  .page-title { font-size:24px; font-weight:700; margin:0 0 4px; }
  .page-subtitle { font-size:14px; color:var(--text-muted); margin:0; }

  /* Data card / table */
  .data-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .data-table { width:100%; border-collapse:collapse; }
  .data-table th { background:#f8fafc; padding:11px 16px; font-size:12px; font-weight:600;
                   color:var(--text-muted); text-align:left; border-bottom:1px solid var(--border); }
  .data-table td { padding:12px 16px; font-size:13.5px; border-bottom:1px solid #f1f5f9; }
  .data-table tbody tr:last-child td { border-bottom:none; }
  .data-table tbody tr:hover td { background:#f8fafc; }

  /* Status badges */
  .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:600; }
  .status-available  { background:#dcfce7; color:#166534; }
  .status-rented     { background:#dbeafe; color:#1e40af; }
  .status-maintenance{ background:#fef3c7; color:#92400e; }
  .status-retired    { background:#f1f5f9; color:#64748b; }
  .status-pending    { background:#fef3c7; color:#92400e; }
  .status-confirmed  { background:#dbeafe; color:#1e40af; }
  .status-active     { background:#dcfce7; color:#166534; }
  .status-completed  { background:#f0fdf4; color:#15803d; }
  .status-cancelled  { background:#fee2e2; color:#991b1b; }
  .status-noshow     { background:#fce7f3; color:#9d174d; }
</style>
</th:block>
</head>
</html>

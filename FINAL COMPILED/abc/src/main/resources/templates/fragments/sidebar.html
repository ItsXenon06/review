<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(active)" class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="bi bi-car-front-fill"></i></div>
    <div class="logo-text">QUẢN LÝ<br>THUÊ XE TỰ LÁI</div>
  </div>
  <nav>
    <a th:href="@{/dashboard}"     th:classappend="${active=='dashboard'}?'active':''"   class="sidebar-link"><i class="bi bi-grid-1x2"></i> Tổng quan</a>
    <a th:href="@{/storage}"       th:classappend="${active=='storage'}?'active':''"     class="sidebar-link"><i class="bi bi-archive"></i> Lưu trữ</a>
    <a th:href="@{/search}"        th:classappend="${active=='search'}?'active':''"      class="sidebar-link"><i class="bi bi-search"></i> Tra cứu</a>
    <a th:href="@{/statistic}"     th:classappend="${active=='statistic'}?'active':''"   class="sidebar-link"><i class="bi bi-bar-chart-line"></i> Thống kê</a>
    <a th:href="@{/calculation}"   th:classappend="${active=='calculation'}?'active':''" class="sidebar-link"><i class="bi bi-calculator"></i> Tính toán</a>
    <a th:href="@{/contracts}"     th:classappend="${active=='contracts'}?'active':''"   class="sidebar-link"><i class="bi bi-file-earmark-text"></i> Hợp đồng</a>
    <a th:href="@{/storage(tab='customer')}" th:classappend="${active=='customers'}?'active':''" class="sidebar-link"><i class="bi bi-people"></i> Khách hàng</a>
    <a th:href="@{/storage(tab='vehicle')}"  th:classappend="${active=='vehicles'}?'active':''"  class="sidebar-link"><i class="bi bi-car-front"></i> Xe</a>
    <a th:href="@{/payments}"      th:classappend="${active=='payments'}?'active':''"    class="sidebar-link"><i class="bi bi-credit-card"></i> Thanh toán</a>
    <a th:href="@{/dashboard}"     th:classappend="${active=='notifications'}?'active':'" class="sidebar-link"><i class="bi bi-bell"></i> Thông báo</a>
    <a th:href="@{/roles}"         th:classappend="${active=='roles'}?'active':''"       class="sidebar-link"><i class="bi bi-shield-check"></i> Phân quyền</a>
    <a th:href="@{/settings}"      th:classappend="${active=='settings'}?'active':''"    class="sidebar-link"><i class="bi bi-gear"></i> Cài đặt</a>
    <a th:href="@{/logout}"        class="sidebar-link"><i class="bi bi-box-arrow-left"></i> Đăng xuất</a>
  </nav>
  <div class="sidebar-support">
    <p><i class="bi bi-headset me-1"></i> Hỗ trợ 24/7</p>
    <div class="phone">1900 1234 567</div>
  </div>
</aside>
</body>
</html>

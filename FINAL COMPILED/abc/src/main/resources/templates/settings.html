<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Cài đặt - Quản lý thuê xe</title>
  <th:block th:replace="~{fragments/shared-styles :: styles}"></th:block>
</head>
<body>
<div class="layout">
  <th:block th:replace="~{fragments/sidebar :: sidebar('settings')}"></th:block>
  <div class="main-wrap">
    <th:block th:replace="~{fragments/topbar :: topbar('Cài đặt hệ thống')}"></th:block>
    <main class="page-content">
      <h1 class="page-title mb-1">Cài đặt</h1>
      <p class="page-subtitle mb-4">Cấu hình hệ thống quản lý thuê xe.</p>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="data-card p-4">
            <h6 class="fw-700 mb-3"><i class="bi bi-building me-2 text-primary"></i>Thông tin công ty</h6>
            <div class="mb-3">
              <label class="form-label fw-600">Tên công ty</label>
              <input type="text" class="form-control" value="Công ty TNHH Thuê Xe Tự Lái ABC"/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Hotline</label>
              <input type="text" class="form-control" value="1900 1234 567"/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Email liên hệ</label>
              <input type="email" class="form-control" value="contact@thuexe.vn"/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Địa chỉ</label>
              <textarea class="form-control" rows="2">123 Đường ABC, Quận 1, TP.HCM</textarea>
            </div>
            <button class="btn btn-primary"><i class="bi bi-save me-1"></i>Lưu thay đổi</button>
          </div>
        </div>
        <div class="col-md-6">
          <div class="data-card p-4">
            <h6 class="fw-700 mb-3"><i class="bi bi-gear me-2 text-primary"></i>Chính sách hệ thống</h6>
            <div class="mb-3">
              <label class="form-label fw-600">Km tối đa/ngày (miễn phí)</label>
              <div class="input-group">
                <input type="number" class="form-control" value="200"/>
                <span class="input-group-text">km</span>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Phí vượt km</label>
              <div class="input-group">
                <input type="number" class="form-control" value="2000"/>
                <span class="input-group-text">đ/km</span>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Thuế VAT</label>
              <div class="input-group">
                <input type="number" class="form-control" value="8"/>
                <span class="input-group-text">%</span>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-600">Phí vệ sinh xe</label>
              <div class="input-group">
                <input type="number" class="form-control" value="100000"/>
                <span class="input-group-text">đ</span>
              </div>
            </div>
            <button class="btn btn-primary"><i class="bi bi-save me-1"></i>Lưu chính sách</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

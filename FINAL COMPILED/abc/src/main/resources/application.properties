spring.application.name=CNPM

# ── Datasource ──────────────────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost:6000;databaseName=CarRentalDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=admin
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Server ──────────────────────────────────────────────────
server.port=8081

# ── DevTools ────────────────────────────────────────────────
spring.devtools.restart.enabled=false

# ── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── JWT ─────────────────────────────────────────────────────
# TODO: move secret to environment variable before production
app.jwt.secret=${JWT_SECRET:thuexe-secret-key-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000